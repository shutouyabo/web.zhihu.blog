site_name: 网址大全
site_description: 
site_url: https://web.zhihu.blog/
repo_url: https://github.com/shutouyabo/web.zhihu.blog
remote_name: shutouyabo/web.zhihu.blog
edit_uri: edit/main/docs/ # 编辑按钮的url
INHERIT: mkdocs.nav.yml


theme:
  name: material
  font: false # 国内网络访问 Google 源可能会有问题
    #text: "Noto Sans SC - local"
    #code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)" # 检查用户系统配置是否为亮色
      scheme: default # 亮色模式
      primary: white # 基本颜色
      accent: blue # 按钮等互动块的颜色
      toggle:
        icon: material/eye
        name: 切换暗色模式
    - media: "(prefers-color-scheme: dark)" # 检查用户系统配置是否为暗色
      scheme: slate # 暗色模式
      primary: black # 基本颜色
      accent: blue # 按钮等互动块的颜色
      toggle:
        icon: material/eye-outline
        name: 切换亮色模式
  language: zh
  logo: img/logo-zip.png #https://cos.ap-guangzhou.myqcloud.com/wiki-media-1253965369/doc/logo-zip.png
  favicon: img/logo.svg #https://cos.ap-guangzhou.myqcloud.com/wiki-media-1253965369/doc/logo.svg #https://cos.ap-guangzhou.myqcloud.com/wiki-media-1253965369/doc/logo-zip.png
  features:
    - content.code.copy # 代码块复制按钮
    - content.action.edit # 文章编辑按钮
    #- navigation.instant # Instant loading，像个单页应用
    - navigation.tracking # Anchor tracking
    - navigation.tabs # 导航栏
    - navigation.footer # 上一篇 / 下一篇导航按钮
    #- navigation.tabs.sticky # 导航栏不随页面滚动隐藏
    - navigation.sections # 侧边栏分组显示
    #- navigation.expand # 导航栏自动展开
    - navigation.indexes # 组标题有专属页面
    - toc.follow # 目录自动跟随
    - navigation.top # 返回顶部按钮
    - search.suggest # 搜索推荐
    #- navigation.prune # 导航修剪，仅渲染可见链接，优化文档数量超过100的站点（实验），会导致页面间跳转速度变慢
    #- search.highlight
  icon:
    repo: material/github
    #edit: material/pencil

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true


  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true
      js_files:
        - javascripts/mathjax.js
        #- javascripts/embed.js
      css_files:
        - stylesheets/extra.css
  - rss:
      abstract_chars_count: -1 # -1 for full content
      #categories:
      # - tags
      #comments_path: "#__comments"
      date_from_meta:
        as_creation: "date"
        #as_update: False
        datetime_format: "%Y-%m-%d %H:%M"
      enabled: True
      feed_ttl: 1440
      image: https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Feed-icon.svg/128px-Feed-icon.svg.png
      length: 1000
      pretty_print: True
      match_path: "(zh|blog)/.*"
      url_parameters:
        utm_source: "documentation"
        utm_medium: "RSS"
        utm_campaign: "feed-syndication"

extra:
  alternate:

  generator: false
  analytics:
    provider: google
    property: G-QBB3SQMGLN # 如果克隆我的站点，请把这串GA代码改成你自己的
  social:
    #- name: 友链 & 导航站
      #link: https://nav.wiki-power.com/
      #icon: fontawesome/regular/address-book
    #- name: 书摘
      #link: http://digest.wiki-power.com/
      #icon: fontawesome/regular/bookmark
    #- name: 资源仓库
      #link: https://github.com/linyuxuanlin/File-host
      #icon: fontawesome/regular/file-lines

#copyright: Copyright &copy; since 2026 by 大全

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - mdx_truly_sane_lists
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/pangu/4.0.7/pangu.min.js
  - javascripts/mathjax.js #https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/latest.min.js
  - https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6 #https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js
  - https://viewer.altium.com/client/static/js/embed.js # javascripts/embed.js 
  - javascripts/adsense.js # AdSense广告脚本
  - javascripts/test-adsense.js # AdSense测试脚本（开发时使用）
  - javascripts/accessibility.js

extra_css:
  - stylesheets/extra.css
  - stylesheets/adsense.css 
